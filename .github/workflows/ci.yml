
name: Pipeline-financas-ia-frontend

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  push:
    branches: [ "develop" ]
  pull_request:
    branches: [ "develop" ]

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # 1. Checkout the code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Node.js environment (Adjust version if needed)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm' # Automatically caches node_modules for faster builds!

      # 3. Install dependencies
      - name: Install dependencies
        run: npm ci # 'npm ci' is cleaner and faster than 'npm install' for pipelines

      # 4. Check code formatting/linting (Optional but highly recommended)
      - name: Run Linter
        run: npm run lint --if-present

      # 5. Run tests
      - name: Run Tests
        run: npm run test --if-present

      # 6. Try to build the project
      - name: Build Project
        run: npm run build
